version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: flask-redis-demo-redis
    ports:
      - "6379:6379"

  web:
    build: ./app
    container_name: flask-redis-demo-web
    ports:
      - "5000:5000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
